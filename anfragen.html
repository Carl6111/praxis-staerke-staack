<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Anfragen — Hausarztpraxis Stärke &amp; Staack</title>
  <link rel="icon" type="image/png" href="images/logo-icon-gruen.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--ink); color: rgba(255,255,255,0.85); min-height: 100vh; }
    body::before { display: none; }
    .admin-shell { max-width: 56rem; margin: 0 auto; padding: 2rem var(--gutter) 5rem; }
    .admin-top {
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      padding: 1.25rem 0 1.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.14);
      margin-bottom: 2.5rem;
    }
    .admin-top h1 { font-size: 1.5rem; color: #fff; display: flex; align-items: center; gap: 0.75rem; }
    .admin-badge {
      font-family: var(--sans); font-size: 0.65rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      background: var(--bronze); color: #fff;
      padding: 0.3rem 0.7rem; border-radius: 99px;
    }
    .admin-nav { display: flex; gap: 0.6rem; align-items: center; }
    .nav-link { color: rgba(255,255,255,0.7); font-size: var(--text-sm); text-decoration: none; padding: 0.5rem 1rem; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius); }
    .nav-link:hover { border-color: var(--bronze); color: #fff; }
    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .panel h2 { color: #fff; font-size: 1.4rem; margin-bottom: 0.4rem; }
    .panel .field label { color: rgba(255,255,255,0.7); }
    .panel .field input { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); color: #fff; }
    .panel .field input:focus { border-color: var(--bronze); box-shadow: 0 0 0 3px rgba(184,132,58,0.25); }
    .msg { display: none; margin-top: 1rem; padding: 0.85rem 1.1rem; border-radius: var(--radius); font-size: var(--text-sm); }
    .msg.err { background: rgba(168,53,43,0.3); border-left: 2px solid #e07a6f; }
    .msg.is-visible { display: block; }
    .login-wrap { max-width: 24rem; margin: 14vh auto 0; text-align: center; }
    .login-wrap img { width: 3.5rem; margin: 0 auto 1.5rem; }
    .summary { color: rgba(255,255,255,0.55); font-size: var(--text-sm); margin-bottom: 1.5rem; }
    .anfrage {
      padding: 1.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .anfrage:last-child { border-bottom: none; }
    .anfrage__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .anfrage__name { color: #fff; font-family: var(--sans); font-weight: 600; font-size: 1.05rem; }
    .anfrage__date { font-size: var(--text-xs); color: rgba(255,255,255,0.4); margin-top: 0.2rem; }
    .anfrage__meta { font-size: var(--text-sm); color: rgba(255,255,255,0.7); margin-top: 0.75rem; line-height: 1.7; }
    .anfrage__meta a { color: var(--bronze); text-decoration: none; }
    .anfrage__meta a:hover { text-decoration: underline; }
    .anfrage__msg { font-size: var(--text-sm); color: rgba(255,255,255,0.85); margin-top: 0.75rem; white-space: pre-wrap; max-width: 44em; }
    .anfrage__actions { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
    .status-select {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2); color: #fff;
      font-family: var(--sans); font-size: var(--text-xs); font-weight: 600;
      padding: 0.45rem 0.7rem; border-radius: var(--radius); cursor: pointer;
    }
    .status-select.s-neu { border-color: var(--bronze); color: var(--bronze); }
    .status-select.s-arbeit { border-color: #7fa8d0; color: #7fa8d0; }
    .status-select.s-erledigt { border-color: #4caf7d; color: #4caf7d; }
    .status-select option { color: var(--text); background: #fff; }
    .btn-del {
      flex-shrink: 0; background: none; border: 1px solid rgba(224,122,111,0.5); color: #e07a6f;
      font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em;
      padding: 0.45rem 0.8rem; border-radius: var(--radius); transition: background var(--dur-fast);
    }
    .btn-del:hover { background: rgba(168,53,43,0.25); }
    .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); padding: 0.5rem 1rem; border-radius: var(--radius); font-size: var(--text-sm); }
    .logout-btn:hover { border-color: var(--bronze); color: #fff; }
    .state { color: rgba(255,255,255,0.5); font-size: var(--text-sm); padding: 1rem 0; }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-wrap" id="login-view">
    <img src="images/logo-icon-transparent.png" alt="" style="filter:brightness(0) invert(1)">
    <h1 style="color:#fff;font-size:1.75rem;margin-bottom:0.5rem">Anfragen</h1>
    <p style="color:rgba(255,255,255,0.6);font-size:var(--text-sm);margin-bottom:2rem">Bitte melden Sie sich mit Ihrem Admin-Schlüssel an.</p>
    <form id="login-form">
      <div class="panel" style="text-align:left">
        <div class="field">
          <label for="admin-key">Admin-Schlüssel</label>
          <input type="password" id="admin-key" autocomplete="current-password" required>
        </div>
        <button class="btn" type="submit" id="login-btn" style="width:100%;justify-content:center"><span>Anmelden</span></button>
        <div class="msg err" id="login-error" role="alert"></div>
      </div>
    </form>
  </div>

  <!-- Panel -->
  <div class="admin-shell" id="admin-view" hidden>
    <div class="admin-top">
      <h1>Stärke &amp; Staack <span class="admin-badge">Anfragen</span></h1>
      <div class="admin-nav">
        <a class="nav-link" href="admin.html">Beiträge</a>
        <button class="logout-btn" type="button" id="logout-btn">Abmelden</button>
      </div>
    </div>

    <section class="panel">
      <h2>Kontaktanfragen</h2>
      <p class="summary" id="summary"></p>
      <p class="state" id="loading">Anfragen werden geladen …</p>
      <p class="state" id="empty" hidden>Noch keine Anfragen vorhanden.</p>
      <div id="list"></div>
    </section>
  </div>

  <script>
    (function () {
      'use strict';
      var BACKEND = 'https://praxis-staerke-staack-production.up.railway.app';
      var STATUS = ['Neu', 'In Arbeit', 'Erledigt'];
      var STATUS_CLASS = { 'Neu': 's-neu', 'In Arbeit': 's-arbeit', 'Erledigt': 's-erledigt' };
      var adminKey = null;

      var loginView = document.getElementById('login-view');
      var adminView = document.getElementById('admin-view');
      var loginError = document.getElementById('login-error');

      function showAdmin() {
        loginView.hidden = true;
        loginView.style.display = 'none';
        adminView.hidden = false;
        loadAnfragen();
      }

      function logout() {
        sessionStorage.removeItem('ak');
        adminKey = null;
        location.reload();
      }

      function fmtDate(s) {
        try {
          return new Date(s).toLocaleString('de-DE', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        } catch (e) { return ''; }
      }

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var val = document.getElementById('admin-key').value.trim();
        if (!val) return;
        var btn = document.getElementById('login-btn');
        btn.disabled = true;
        loginError.classList.remove('is-visible');
        try {
          var res = await fetch(BACKEND + '/api/auth', { method: 'POST', headers: { 'X-Admin-Key': val } });
          if (res.ok) {
            sessionStorage.setItem('ak', val);
            adminKey = val;
            showAdmin();
          } else if (res.status === 429) {
            throw new Error('Zu viele Versuche. Bitte 15 Minuten warten.');
          } else {
            throw new Error('Falscher Schlüssel. Bitte erneut versuchen.');
          }
        } catch (err) {
          loginError.textContent = err.message || 'Verbindungsfehler.';
          loginError.classList.add('is-visible');
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('logout-btn').addEventListener('click', logout);

      async function loadAnfragen() {
        var loading = document.getElementById('loading');
        var empty = document.getElementById('empty');
        var list = document.getElementById('list');
        var summary = document.getElementById('summary');
        loading.hidden = false;
        empty.hidden = true;
        try {
          var res = await fetch(BACKEND + '/api/anfragen', { headers: { 'X-Admin-Key': adminKey } });
          if (res.status === 401) { logout(); return; }
          if (!res.ok) throw new Error();
          var data = await res.json();
          var items = data.anfragen || [];
          loading.hidden = true;
          list.innerHTML = '';
          empty.hidden = items.length > 0;
          var offen = items.filter(function (a) { return a.status !== 'Erledigt'; }).length;
          summary.textContent = items.length + ' Anfragen insgesamt · ' + offen + ' offen';
          items.forEach(function (a) { list.appendChild(renderAnfrage(a)); });
        } catch (e) {
          loading.textContent = 'Fehler beim Laden der Anfragen.';
        }
      }

      function renderAnfrage(a) {
        var wrap = document.createElement('div');
        wrap.className = 'anfrage';

        var head = document.createElement('div');
        head.className = 'anfrage__head';

        var left = document.createElement('div');
        var name = document.createElement('div');
        name.className = 'anfrage__name';
        name.textContent = (a.vorname || '') + ' ' + (a.nachname || '');
        var date = document.createElement('div');
        date.className = 'anfrage__date';
        date.textContent = fmtDate(a.created_at);
        left.appendChild(name);
        left.appendChild(date);

        var actions = document.createElement('div');
        actions.className = 'anfrage__actions';

        var sel = document.createElement('select');
        sel.className = 'status-select ' + (STATUS_CLASS[a.status] || 's-neu');
        STATUS.forEach(function (s) {
          var opt = document.createElement('option');
          opt.value = s; opt.textContent = s;
          if (s === a.status) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', async function () {
          var prev = a.status;
          sel.disabled = true;
          try {
            var r = await fetch(BACKEND + '/api/anfragen/' + encodeURIComponent(a.id) + '/status', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
              body: JSON.stringify({ status: sel.value })
            });
            if (r.status === 401) { logout(); return; }
            if (!r.ok) throw new Error();
            a.status = sel.value;
            sel.className = 'status-select ' + (STATUS_CLASS[a.status] || 's-neu');
            loadAnfragen();
          } catch (e) {
            sel.value = prev;
            alert('Status konnte nicht gespeichert werden.');
          } finally {
            sel.disabled = false;
          }
        });

        var del = document.createElement('button');
        del.className = 'btn-del';
        del.type = 'button';
        del.textContent = 'Löschen';
        del.addEventListener('click', async function () {
          if (!confirm('Anfrage wirklich löschen?')) return;
          del.disabled = true;
          try {
            var r = await fetch(BACKEND + '/api/anfragen/' + encodeURIComponent(a.id), {
              method: 'DELETE',
              headers: { 'X-Admin-Key': adminKey }
            });
            if (r.status === 401) { logout(); return; }
            if (!r.ok) throw new Error();
            loadAnfragen();
          } catch (e) {
            del.disabled = false;
            alert('Fehler beim Löschen. Bitte erneut versuchen.');
          }
        });

        actions.appendChild(sel);
        actions.appendChild(del);
        head.appendChild(left);
        head.appendChild(actions);

        var meta = document.createElement('div');
        meta.className = 'anfrage__meta';
        var mail = document.createElement('a');
        mail.href = 'mailto:' + a.email;
        mail.textContent = a.email;
        meta.appendChild(document.createTextNode('E-Mail: '));
        meta.appendChild(mail);
        if (a.telefon) {
          var tel = document.createElement('a');
          tel.href = 'tel:' + a.telefon.replace(/\s+/g, '');
          tel.textContent = a.telefon;
          meta.appendChild(document.createElement('br'));
          meta.appendChild(document.createTextNode('Telefon: '));
          meta.appendChild(tel);
        }
        if (a.anliegen) {
          meta.appendChild(document.createElement('br'));
          meta.appendChild(document.createTextNode('Anliegen: ' + a.anliegen));
        }

        var msg = document.createElement('div');
        msg.className = 'anfrage__msg';
        msg.textContent = a.nachricht || '';

        wrap.appendChild(head);
        wrap.appendChild(meta);
        wrap.appendChild(msg);
        return wrap;
      }

      var saved = sessionStorage.getItem('ak');
      if (saved) {
        adminKey = saved;
        showAdmin();
      }
    })();
  </script>
</body>
</html>
